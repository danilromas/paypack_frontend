<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PayPack.uno</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(180deg, #f0f4f8 0%, #e2e8f0 40%, #d1dce8 70%, #c5d3e0 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 25px 50px;
            z-index: 100;
            background: linear-gradient(to bottom, rgba(255,255,255,0.4) 0%, transparent 100%);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo-icon {
            width: 28px;
            height: 28px;
            background: linear-gradient(135deg, #4a90a4 0%, #2c5f6f 100%);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 14px;
            font-weight: 700;
        }

        .logo-text {
            color: #3a5a6a;
            font-size: 20px;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        .logo-text span {
            color: #5a8a9a;
            font-weight: 400;
        }

        /* Navigation */
        .nav {
            display: flex;
            gap: 35px;
        }

        .nav a {
            color: #6b8a9a;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 0.3px;
            transition: all 0.3s ease;
            position: relative;
        }

        .nav a::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, #4a90a4, #2c5f6f);
            transition: width 0.3s ease;
        }

        .nav a:hover {
            color: #3a5a6a;
        }

        .nav a:hover::after {
            width: 100%;
        }

        /* Main Content - Split Screen */
        .main {
            flex: 1;
            display: flex;
            position: relative;
            margin-top: 80px;
        }

        .split-container {
            display: flex;
            width: 100%;
            height: calc(100vh - 80px);
        }

        /* Card Sections */
        .card-section {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            cursor: pointer;
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
        }

        .card-section::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, rgba(255,255,255,0.3) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.6s ease;
        }

        .card-section:hover::before {
            opacity: 1;
        }

        /* Left Section - New Deal */
        .section-left {
            border-right: 1px solid rgba(255,255,255,0.3);
        }

        .section-left:hover {
            flex: 1.5;
            background: linear-gradient(135deg, rgba(74,144,164,0.08) 0%, rgba(44,95,111,0.05) 100%);
        }

        /* Right Section - New Shipment */
        .section-right:hover {
            flex: 1.5;
            background: linear-gradient(225deg, rgba(74,144,164,0.08) 0%, rgba(44,95,111,0.05) 100%);
        }

        /* Card Content */
        .card-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
            padding: 40px;
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 10;
        }

        .card-section:hover .card-content {
            transform: scale(1.05);
        }

        /* Icon Container */
        .icon-wrapper {
            width: 140px;
            height: 140px;
            background: rgba(255,255,255,0.6);
            backdrop-filter: blur(10px);
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 
                0 4px 20px rgba(74,144,164,0.1),
                inset 0 1px 0 rgba(255,255,255,0.8);
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(255,255,255,0.5);
        }

        .card-section:hover .icon-wrapper {
            transform: translateY(-10px);
            box-shadow: 
                0 20px 40px rgba(74,144,164,0.2),
                0 0 60px rgba(74,144,164,0.1),
                inset 0 1px 0 rgba(255,255,255,0.9);
            background: rgba(255,255,255,0.8);
        }

        .card-icon {
            width: 70px;
            height: 70px;
            stroke: #4a90a4;
            stroke-width: 1.8;
            fill: none;
            transition: all 0.5s ease;
        }

        .card-section:hover .card-icon {
            stroke: #2c5f6f;
            transform: scale(1.1);
        }

        /* Card Title */
        .card-title {
            color: #4a6572;
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 3px;
            text-transform: uppercase;
            transition: all 0.5s ease;
        }

        .card-section:hover .card-title {
            color: #2c5f6f;
            letter-spacing: 4px;
            transform: translateY(-5px);
        }

        /* Subtitle hint */
        .card-hint {
            color: #8aa0ac;
            font-size: 13px;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.5s ease 0.1s;
            font-weight: 400;
        }

        .card-section:hover .card-hint {
            opacity: 1;
            transform: translateY(0);
        }

        /* Center merge effect line */
        .merge-line {
            position: absolute;
            left: 50%;
            top: 20%;
            bottom: 20%;
            width: 2px;
            background: linear-gradient(to bottom, transparent, rgba(74,144,164,0.2), transparent);
            transform: translateX(-50%);
            pointer-events: none;
            transition: all 0.6s ease;
        }

        .card-section:hover ~ .merge-line,
        .merge-line.active {
            opacity: 0;
        }

        /* Active state when hovering either side */
        .split-container:has(.section-left:hover) .section-right {
            opacity: 0.6;
            filter: blur(1px);
        }

        .split-container:has(.section-right:hover) .section-left {
            opacity: 0.6;
            filter: blur(1px);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header {
                padding: 20px 25px;
            }

            .nav {
                gap: 20px;
            }

            .nav a {
                font-size: 13px;
            }

            .split-container {
                flex-direction: column;
            }

            .section-left {
                border-right: none;
                border-bottom: 1px solid rgba(255,255,255,0.3);
            }

            .icon-wrapper {
                width: 100px;
                height: 100px;
            }

            .card-icon {
                width: 50px;
                height: 50px;
            }

            .card-title {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="logo">
            <div class="logo-icon">P</div>
            <div class="logo-text">PayPack<span>.uno</span></div>
        </div>
        <nav class="nav">
            <a href="#about">about</a>
            <a href="#login">log in</a>
            <a href="#signup">sign up</a>
        </nav>
    </header>

    <!-- Main Content -->
    <main class="main">
        <div class="split-container">
            <!-- Left: New Deal -->
            <section class="card-section section-left" onclick="handleClick('deal')">
                <div class="card-content">
                    <div class="icon-wrapper">
                        <svg class="card-icon" viewBox="0 0 100 100">
                            <!-- Handshake -->
                            <path d="M20 50 L15 45 L10 50 L15 60 L30 70 L45 65 L60 70 L75 60 L80 50 L75 45 L70 50" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M30 70 L30 80 L40 85 L50 80 L60 70" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M20 50 L30 40 L40 45 L50 40 L60 45 L70 50" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M30 40 L25 30 L35 25 L45 30 L55 25 L65 30 L60 40" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M35 25 L40 15 L50 15 L55 25" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </div>
                    <h2 class="card-title">New Deal</h2>
                    <p class="card-hint">Create secure escrow transaction</p>
                </div>
            </section>

            <!-- Center Line -->
            <div class="merge-line"></div>

            <!-- Right: New Shipment -->
            <section class="card-section section-right" onclick="handleClick('shipment')">
                <div class="card-content">
                    <div class="icon-wrapper">
                        <svg class="card-icon" viewBox="0 0 100 100">
                            <!-- Box -->
                            <path d="M25 35 L50 22 L75 35 L75 70 L50 83 L25 70 Z" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M25 35 L50 48 L75 35" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M50 48 L50 83" stroke-linecap="round" stroke-linejoin="round"/>
                            <!-- Arrow -->
                            <path d="M50 10 L50 30" stroke-linecap="round"/>
                            <path d="M42 22 L50 30 L58 22" stroke-linecap="round" stroke-linejoin="round"/>
                            <!-- Detail -->
                            <path d="M35 58 L35 68" stroke-linecap="round"/>
                        </svg>
                    </div>
                    <h2 class="card-title">New Shipment</h2>
                    <p class="card-hint">Track & manage delivery</p>
                </div>
            </section>
        </div>
    </main>

    <script>
        function handleClick(type) {
            console.log('Clicked:', type);
            // Add your navigation logic here
            // window.location.href = type === 'deal' ? '/new-deal' : '/new-shipment';
        }

        // Add smooth transition effects
        document.querySelectorAll('.card-section').forEach(section => {
            section.addEventListener('mouseenter', function() {
                document.querySelector('.merge-line').classList.add('active');
            });
            
            section.addEventListener('mouseleave', function() {
                document.querySelector('.merge-line').classList.remove('active');
            });
        });
    </script>
</body>
</html>
